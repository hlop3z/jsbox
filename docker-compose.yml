services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: testdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d testdb"]
      interval: 2s
      timeout: 5s
      retries: 10

  cockroach:
    image: cockroachdb/cockroach:latest-v24.3
    command: start-single-node --insecure --advertise-addr=cockroach
    ports:
      - "26257:26257"
    healthcheck:
      test: ["CMD", "cockroach", "sql", "--insecure", "-e", "SELECT 1"]
      interval: 2s
      timeout: 5s
      retries: 10

  cockroach-init:
    image: cockroachdb/cockroach:latest-v24.3
    depends_on:
      cockroach:
        condition: service_healthy
    command: >
      sql --insecure --host=cockroach -e "
        CREATE DATABASE IF NOT EXISTS testdb;
        CREATE USER IF NOT EXISTS test;
        GRANT ALL ON DATABASE testdb TO test;
      "
